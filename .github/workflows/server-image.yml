name: Publicar imagem do servidor (Docker Hub)

# Constrói e publica a imagem do TCMine-Server no Docker Hub.
# Dispara em tags v* (ex.: v1.0.0) e manualmente.
#
# Pré-requisito — define no repositório (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  → o teu utilizador do Docker Hub
#   DOCKERHUB_TOKEN     → um Access Token do Docker Hub (Read & Write)
# A imagem fica em:  docker.io/<DOCKERHUB_USERNAME>/tcmine-server

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadados (tags da imagem)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tcmine-server
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: TCMine-Server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
